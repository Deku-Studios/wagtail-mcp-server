name: Docs

# Builds the MkDocs site and publishes it to GitHub Pages.
#
# Trigger model: pushes to main rebuild and deploy. Pull requests
# build (no deploy) so reviewers see whether their docs changes
# survive the build before merge. Tags don't trigger -- the docs
# site reflects "what's on main", not per-release snapshots.
#
# Permissions are scoped per the GitHub Pages "deploy from
# Actions" pattern: contents:read for the checkout, pages:write
# and id-token:write for the deploy step. No repo-wide tokens.

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
      - "pyproject.toml"
  pull_request:
    branches: [main]
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - ".github/workflows/docs.yml"
  workflow_dispatch: {}

# Only one in-flight deploy at a time. A second push to main while
# the first is still building cancels nothing -- the queue
# serialises them so we never end up with an out-of-order publish.
concurrency:
  group: pages
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install docs extras
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[docs]'

      # configure-pages resolves the site's deployment URL and, when
      # `enablement: true` is set, tries to enable Pages on the repo
      # if it isn't already. The enablement call is idempotent and
      # only runs on push/dispatch because pull_request doesn't have
      # the token scope to mutate repo settings.
      - name: Configure Pages
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Build site
        run: mkdocs build --strict --clean --site-dir _site

      - name: Upload artifact
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
