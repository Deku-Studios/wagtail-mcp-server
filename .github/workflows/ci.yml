name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
        wagtail: ["7.3.1", "main"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install with Wagtail ${{ matrix.wagtail }}
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          if [ "${{ matrix.wagtail }}" = "main" ]; then
            pip install --upgrade "git+https://github.com/wagtail/wagtail@main#egg=wagtail"
          else
            pip install "wagtail==${{ matrix.wagtail }}"
          fi
      - name: Pytest
        run: pytest -v
